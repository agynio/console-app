version: v2beta1

vars:
  APP_NAMESPACE: platform
  E2E_IMAGE: mcr.microsoft.com/playwright:v1.59.1-noble
  ARGOS_TOKEN:
    source: env
    default: ""
  ARGOS_BRANCH:
    source: env
    default: ""
  ARGOS_COMMIT:
    source: env
    default: ""
  CLUSTER_ADMIN_TOKEN:
    source: env
    default: ""
  E2E_OIDC_REDIRECT_URI:
    source: env
    default: ""

functions:
  disable_argocd_sync: |-
    for app in console-app gateway; do
      if kubectl get application "$app" -n argocd >/dev/null 2>&1; then
        echo "Disabling ArgoCD auto-sync for $app..."
        kubectl patch application "$app" -n argocd \
          --type merge \
          -p '{"spec":{"syncPolicy":{"automated":null}}}'
        echo "ArgoCD auto-sync disabled for $app."
      else
        echo "WARNING: ArgoCD Application '$app' not found in argocd namespace."
      fi
    done
  restore_argocd_sync: &restore_argocd_sync |-
    for app in console-app gateway; do
      if kubectl get application "$app" -n argocd >/dev/null 2>&1; then
        echo "Re-enabling ArgoCD auto-sync for $app..."
        kubectl patch application "$app" -n argocd \
          --type merge \
          -p '{"spec":{"syncPolicy":{"automated":{"prune":true,"selfHeal":true}}}}'
        echo "ArgoCD auto-sync restored for $app."
      else
        echo "WARNING: ArgoCD Application '$app' not found."
      fi
    done
  deploy_pr_image: |-
    echo "Deploying PR image to cluster..."
    IMAGE="${PR_IMAGE:-}"
    if [ -z "$IMAGE" ]; then
      echo "ERROR: PR_IMAGE not set, aborting hot deploy"
      exit 1
    fi
    kubectl set image deployment/console-app console-app="$IMAGE" -n ${APP_NAMESPACE}
    kubectl rollout status deployment/console-app -n ${APP_NAMESPACE} --timeout=120s
    echo "PR image deployed successfully"
  deploy_gateway_pr_image: |-
    IMAGE="${GATEWAY_PR_IMAGE:-}"
    if [ -z "$IMAGE" ]; then
      echo "No GATEWAY_PR_IMAGE provided, skipping gateway deploy"
      exit 0
    fi
    echo "Deploying gateway PR image to cluster..."
    kubectl set image deployment/gateway gateway="$IMAGE" -n ${APP_NAMESPACE}
    kubectl rollout status deployment/gateway -n ${APP_NAMESPACE} --timeout=120s
    echo "Gateway PR image deployed successfully"
  dump_agent_logs: |-
    echo "=== ORCHESTRATOR LOGS ==="
    kubectl logs deploy/agents-orchestrator -n platform --tail=100 || true
    echo "=== AGENT WORKLOAD PODS (agyn-workloads) ==="
    kubectl get pods -n agyn-workloads -o wide 2>/dev/null || true
    echo "=== AGENT WORKLOAD LOGS ==="
    for pod in $(kubectl get pods -n agyn-workloads -o name 2>/dev/null); do
      echo "--- $pod ---"
      kubectl logs "$pod" -n agyn-workloads --all-containers --tail=50 2>/dev/null || true
    done
    echo "=== K8S-RUNNER LOGS ==="
    kubectl logs deploy/k8s-runner -n platform --tail=50 || true
    echo "=== END DIAGNOSTIC LOGS ==="

deployments:
  e2e-runner:
    namespace: ${APP_NAMESPACE}
    helm:
      chart:
        name: component-chart
        repo: https://charts.devspace.sh
      values:
        containers:
          - image: ${E2E_IMAGE}
            env:
              - name: E2E_BASE_URL
                value: "https://console.agyn.dev"
              - name: E2E_OIDC_REDIRECT_URI
                value: "${E2E_OIDC_REDIRECT_URI}"
              - name: ARGOS_TOKEN
                value: "${ARGOS_TOKEN}"
              - name: ARGOS_BRANCH
                value: "${ARGOS_BRANCH}"
              - name: ARGOS_COMMIT
                value: "${ARGOS_COMMIT}"
              - name: CLUSTER_ADMIN_TOKEN
                value: "${CLUSTER_ADMIN_TOKEN}"
              - name: CI
                value: "${CI}"
        labels:
          app.kubernetes.io/name: console-app-e2e

commands:
  test-e2e: |-
    devspace run-pipeline test-e2e $@

pipelines:
  dev:
    flags:
      - name: watch
        short: w
        description: "Keep DevSpace running and stream logs"
    run: |-
      disable_argocd_sync
      if [ "$(get_flag "watch")" == "true" ]; then
        start_dev --disable-pod-replace console-app
      else
        start_dev --disable-pod-replace console-app
        echo "Dev environment ready. Stopping dev session."
        stop_dev console-app
      fi

  test-e2e:
    run: |-
      disable_argocd_sync
      deploy_pr_image
      deploy_gateway_pr_image
      create_deployments e2e-runner
      start_dev e2e-runner &
      sleep 5
      set +e
      exec_container \
        --label-selector "app.kubernetes.io/name=console-app-e2e" \
        -n ${APP_NAMESPACE} \
        -- bash -c '
          echo "Waiting for file sync..."
          for i in $(seq 1 60); do
            [ -f /opt/app/data/package.json ] && [ -f /opt/app/data/package-lock.json ] && [ -f /opt/app/data/test/e2e/fixtures.ts ] && [ -f /opt/app/data/test/e2e/console-api.ts ] && [ -f /opt/app/data/test/e2e/sign-in-helper.ts ] && [ -f /opt/app/data/test/e2e/sign-in.spec.ts ] && [ -f /opt/app/data/test/e2e/dashboard.spec.ts ] && [ -f /opt/app/data/test/e2e/organizations.spec.ts ] && [ -f /opt/app/data/test/e2e/organization-members.spec.ts ] && [ -f /opt/app/data/test/e2e/organization-secrets.spec.ts ] && [ -f /opt/app/data/test/e2e/model-test.spec.ts ] && [ -f /opt/app/data/test/e2e/users.spec.ts ] && [ -f /opt/app/data/test/e2e/runners.spec.ts ] && [ -f /opt/app/data/test/e2e/settings.spec.ts ] && break
            sleep 2
          done
          if [ ! -f /opt/app/data/package.json ] || [ ! -f /opt/app/data/package-lock.json ] || [ ! -f /opt/app/data/test/e2e/fixtures.ts ] || [ ! -f /opt/app/data/test/e2e/console-api.ts ] || [ ! -f /opt/app/data/test/e2e/sign-in-helper.ts ] || [ ! -f /opt/app/data/test/e2e/sign-in.spec.ts ] || [ ! -f /opt/app/data/test/e2e/dashboard.spec.ts ] || [ ! -f /opt/app/data/test/e2e/organizations.spec.ts ] || [ ! -f /opt/app/data/test/e2e/organization-members.spec.ts ] || [ ! -f /opt/app/data/test/e2e/organization-secrets.spec.ts ] || [ ! -f /opt/app/data/test/e2e/model-test.spec.ts ] || [ ! -f /opt/app/data/test/e2e/users.spec.ts ] || [ ! -f /opt/app/data/test/e2e/runners.spec.ts ] || [ ! -f /opt/app/data/test/e2e/settings.spec.ts ]; then
            echo "ERROR: File sync timed out (package.json, package-lock.json, or test/e2e files not found after 120s)"
            exit 1
          fi
          sleep 5
          cd /opt/app/data
          npm ci --ignore-scripts
          E2E_BASE_URL=https://console.agyn.dev ARGOS_TOKEN=${ARGOS_TOKEN} ARGOS_BRANCH=${ARGOS_BRANCH} ARGOS_COMMIT=${ARGOS_COMMIT} CI=true npm run test:e2e
        '
      EXIT_CODE=$?
      set -e
      dump_agent_logs || true
      stop_dev e2e-runner
      purge_deployments e2e-runner
      restore_argocd_sync
      exit ${EXIT_CODE}

hooks:
  - name: restore-argocd-auto-sync
    events:
      - after:dev:console-app
    command: bash
    args:
      - -c
      - *restore_argocd_sync

dev:
  e2e-runner:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: console-app-e2e
    command: ["sleep", "infinity"]
    workingDir: /opt/app/data
    sync:
      - path: ./:/opt/app/data
        excludePaths:
          - .git/
          - .devspace/
          - node_modules/
          - dist/
  console-app:
    namespace: ${APP_NAMESPACE}
    labelSelector:
      app.kubernetes.io/name: console-app
      app.kubernetes.io/instance: console-app
    containers:
      console-app:
        sync:
          - path: ./dist:/usr/share/nginx/html
            excludePaths:
              - .git/
              - .devspace/
              - node_modules/
        logs:
          enabled: true
          lastLines: 200
    ports:
      - port: "3000"
