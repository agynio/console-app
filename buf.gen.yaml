version: v2
inputs:
  - git_repo: https://github.com/agynio/api.git
    branch: noa/issue-51-agent-availability
    subdir: proto
    paths:
      - agynio/api/gateway/v1
      - agynio/api/agents/v1
      - agynio/api/apps/v1
      - agynio/api/llm/v1
      - agynio/api/metering/v1
      - agynio/api/users/v1
      - agynio/api/organizations/v1
      - agynio/api/runners/v1
      - agynio/api/secrets/v1
plugins:
  - local: protoc-gen-es
    out: src/gen
    opt: target=ts
    include_imports: true
