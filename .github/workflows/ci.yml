name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Free disk space
        run: |
          # Remove Java (JDKs)
          sudo rm -rf /usr/lib/jvm

          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove Haskell (GHC)
          sudo rm -rf /usr/local/.ghcup

          # Remove Julia
          sudo rm -rf /usr/local/julia*

          # Remove Android SDKs
          sudo rm -rf /usr/local/lib/android
      - name: Checkout service repo
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate

      - name: Build assets
        run: npm run build

      - name: Checkout bootstrap
        uses: actions/checkout@v4
        with:
          repository: agynio/bootstrap
          ref: main
          path: bootstrap

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.28.7

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/v5.7.5/install.sh | TAG=v5.7.5 bash
          k3d version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Install DevSpace
        run: |
          curl -fsSL --retry 3 --retry-delay 5 -o /tmp/devspace "https://github.com/loft-sh/devspace/releases/download/v6.3.20/devspace-linux-amd64"
          sudo install -c -m 0755 /tmp/devspace /usr/local/bin
          devspace version

      - name: Provision cluster
        working-directory: bootstrap
        env:
          TF_VAR_gateway_chart_version: "0.22.0"
          TF_VAR_k8s_runner_identity_id: 439e0da2-88cd-46d7-bb9c-56c723c15606
        run: |
          ./apply.sh -y

      - name: Export cluster admin token
        working-directory: bootstrap
        run: |
          token=$(terraform -chdir=stacks/platform output -raw cluster_admin_api_token)
          echo "::add-mask::${token}"
          echo "CLUSTER_ADMIN_TOKEN=${token}" >> "$GITHUB_ENV"

      - name: Verify cluster health
        working-directory: bootstrap
        run: ./.github/scripts/verify_platform_health.sh

      - name: Sync console app sources
        env:
          KUBECONFIG: ${{ github.workspace }}/bootstrap/stacks/k8s/.kube/agyn-local-kubeconfig.yaml
        run: devspace dev --pipeline dev

      - name: Run E2E tests
        env:
          KUBECONFIG: ${{ github.workspace }}/bootstrap/stacks/k8s/.kube/agyn-local-kubeconfig.yaml
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ARGOS_BRANCH: ${{ github.head_ref || github.ref_name }}
          ARGOS_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
          CLUSTER_ADMIN_TOKEN: ${{ env.CLUSTER_ADMIN_TOKEN }}
        run: devspace run test-e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
